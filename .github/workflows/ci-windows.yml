name: Build - Windows

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "include/**"
      - "examples/**"
      - "CMakeLists.txt"
      - "vcpkg.json"
      - ".github/workflows/ci-windows.yml"
  push:
    paths:
      - "src/**"
      - "include/**"
      - "examples/**"
      - "CMakeLists.txt"
      - "vcpkg.json"
      - ".github/workflows/ci-windows.yml"
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  MAKEFLAGS: "-j 4"

jobs:
  cancel-runs:
    if: github.event_name == 'pull_request' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

  build-windows:
    if: ${{ github.event_name == 'push' || !github.event.pull_request.draft }}
    name: windows-latest-${{ matrix.config }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        include:
          - triplet: x64-windows
        arch: [x64]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Restore artifacts and install vcpkg
      id: vcpkg-step
      run: |
        $vcpkgCommitId = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
        Write-Host "vcpkg commit ID: $vcpkgCommitId"
        echo "VCPKG_GIT_COMMIT_ID=$vcpkgCommitId" >> $env:GITHUB_ENV

    - name: Get latest CMake and ninja
      uses: lukka/get-cmake@main

    - name: Run vcpkg
      uses: lukka/run-vcpkg@main
      with:
        vcpkgGitCommitId: '${{ env.VCPKG_GIT_COMMIT_ID }}'
    
    - name: Configure CMake (Windows)
      uses: lukka/run-cmake@v10
      with:
        configurePreset: 'windows-${{ matrix.config }}'
    
    - name: Build (Windows)
      uses: lukka/run-cmake@v10
      with:
        buildPreset: 'windows-${{ matrix.config }}'
    
    - name: Test (Windows)
      uses: lukka/run-cmake@v10
      with:
        testPreset: 'windows-${{ matrix.config }}'
    
    - name: Run benchmark (Release only)
      if: matrix.config == 'Release'
      working-directory: build/bin
      run: |
        echo "Running benchmarks..."
        .\lockfree_benchmark.exe --benchmark_repetitions=3 --benchmark_report_aggregates_only=true
    
    - name: Upload build artifacts
      if: matrix.config == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: lockfree-windows-${{ matrix.arch }}
        path: |
          build/bin/*.exe
          build/bin/*.dll
        retention-days: 7